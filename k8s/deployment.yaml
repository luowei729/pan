apiVersion: apps/v1
kind: Deployment
metadata:
  name: pan
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pan
  template:
    metadata:
      labels:
        app: pan
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: pan
          image: ghcr.io/luowei729/pan:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80