apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pan-storage
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 20Gi
  # 如果你的集群没有默认支持 RWX 的 StorageClass，
  # 把下一行取消注释并改成实际可用的名称，例如 nfs-client / longhorn / cephfs。
  # storageClassName: your-rwx-storage-class
