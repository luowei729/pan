apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pan-storage
spec:
  # Backed by the Rook CephFS storage class defined in rook-cephfs-storageclass.yaml
  storageClassName: rook-cephfs
  accessModes:
    - ReadWriteMany
  volumeMode: Filesystem
  resources:
    requests:
      storage: 20Gi
