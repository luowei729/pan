apiVersion: apps/v1
kind: Deployment
metadata:
  name: pan
  namespace: pan
spec:
  replicas: 2
  revisionHistoryLimit: 3

  selector:
    matchLabels:
      app: pan

  template:
    metadata:
      labels:
        app: pan

    spec:
      initContainers:
        - name: seed-www-data
          image: ghcr.io/luowei729/pan:latest
          imagePullPolicy: Always
          command:
            - sh
            - -ec
            - |
              target=/seed
              lockdir="$target/.seed-lock"

              fix_permissions() {
                chown -R 33:33 "$target"
                chmod 2775 "$target"
                find "$target" -mindepth 1 -type d -exec chmod 2775 {} +
                find "$target" -type f -exec chmod ug+rw,o+r {} +
              }

              seed_image_files() {
                # Merge bundled seed files into the PVC without overwriting user data.
                cp -an /var/www/html/. "$target"/
              }

              mkdir -p "$target"

              if mkdir "$lockdir" 2>/dev/null; then
                trap 'rmdir "$lockdir"' EXIT
                seed_image_files
                echo "Merged image files into PVC without overwriting existing data."
              else
                echo "Waiting for another pod to finish seeding..."
                while [ -d "$lockdir" ]; do
                  sleep 2
                done
              fi

              fix_permissions
              echo "Normalized permissions for PVC content."
          volumeMounts:
            - name: html-volume
              mountPath: /seed

      containers:
        - name: pan
          image: ghcr.io/luowei729/pan:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 80

          # PVC stores the app root directly, including index.php and uploaded files.
          volumeMounts:
            - name: html-volume
              mountPath: /var/www/html

      volumes:
        - name: html-volume
          persistentVolumeClaim:
            claimName: pan-pvc

      imagePullSecrets:
        - name: ghcr-secret
