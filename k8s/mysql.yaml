apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
spec:
  replicas: 1

  selector:
    matchLabels:
      app: mysql   # ⭐ 必须有

  template:
    metadata:
      labels:
        app: mysql   # ⭐ 必须和 selector 一样

    spec:
      containers:
      - name: mysql
        image: mysql:8.0

        ports:
        - containerPort: 3306

        env:
        - name: MYSQL_ROOT_PASSWORD
          value: root123
        - name: MYSQL_DATABASE
          value: appdb